<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Capital Compass AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:'Inter',sans-serif;
color:white;
}

/* Top Title */
.header{
text-align:center;
padding:40px 0 10px 0;
}

.header h1{
font-family:'Orbitron',sans-serif;
font-size:30px;
letter-spacing:1px;
color:#3b82f6;
}

/* Center Container */
.wrapper{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* Card */
.card{
background:#1e293b;
padding:45px;
border-radius:14px;
width:380px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* Heading */
.card h2{
margin-bottom:25px;
font-size:22px;
color:#10b981;
}

/* Inputs */
input{
width:100%;
padding:12px;
margin-bottom:18px;
border:none;
border-radius:8px;
background:#111827;
color:white;
font-size:14px;
outline:none;
border:1px solid #2d3748;
transition:0.3s;
}

input:focus{
border-color:#10b981;
box-shadow:0 0 8px rgba(16,185,129,0.4);
}

/* Button */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#10b981;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#059669;
}

/* Message */
#message{
margin-top:18px;
font-size:14px;
min-height:20px;
}

.success{
color:#22c55e;
}

.error{
color:#ef4444;
}

/* Link */
p{
margin-top:20px;
font-size:14px;
}

a{
color:#3b82f6;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:underline;
}

/* Footer */
.footer{
text-align:center;
padding:15px;
font-size:13px;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">
<h1>Capital Compass AI</h1>
</div>

<div class="wrapper">
<div class="card">
<h2>Create Account</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="register()">Register</button>

<div id="message"></div>

<p>Already have an account? <a href="login.html">Login</a></p>
</div>
</div>

<div class="footer">
© 2026 Capital Compass AI · Secure Wealth Platform
</div>

<script>
async function register(){

const res=await fetch("/api/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:username.value,
password:password.value
})
});

const data=await res.json();
const msg=document.getElementById("message");

if(!res.ok){
msg.className="error";
msg.innerText=data.message;
return;
}

msg.className="success";
msg.innerText="Registration successful! Redirecting...";

setTimeout(()=>{
location.href="login.html";
},1200);
}
</script>

</body>
</html>
