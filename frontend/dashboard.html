<!DOCTYPE html>
<html>
<head>
<title>Investment Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
/* PROFESSIONAL FINTECH GRADIENT */
background: linear-gradient(135deg, #0c1427 0%, #1a2332 25%, #1e293b 50%, #0f172a 100%);
font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
color:#e2e8f0;
padding:40px;
min-height:100vh;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.header h2{
font-size:28px;
font-weight:600;
background:linear-gradient(135deg, #4f46e5, #7c3aed);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
letter-spacing:-0.5px;
}

.logout-btn{
padding:12px 24px;
background:linear-gradient(135deg, #6b7280, #4b5563);
border:1px solid rgba(255,255,255,0.1);
border-radius:12px;
color:#f9fafb;
font-weight:500;
font-size:14px;
cursor:pointer;
transition:all 0.2s ease;
backdrop-filter:blur(10px);
}

.logout-btn:hover{
background:linear-gradient(135deg, #4b5563, #374151);
transform:translateY(-1px);
box-shadow:0 10px 25px rgba(107,114,128,0.3);
}

/* FORM CARD - CLEAN GLASS */
.form-card{
background:rgba(30,41,59,0.85);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
box-shadow:0 25px 50px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.05);
margin-bottom:40px;
}

.form-row{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:24px;
}

.form-card input{
padding:16px 20px;
border-radius:12px;
border:1px solid rgba(148,163,184,0.3);
background:rgba(17,24,39,0.8);
color:#f1f5f9;
width:200px;
font-size:15px;
font-weight:400;
font-family:inherit;
transition:all 0.2s ease;
}

.form-card input:focus{
outline:none;
border-color:#4f46e5;
background:rgba(17,24,39,1);
box-shadow:0 0 0 3px rgba(79,70,229,0.1);
}

.form-card input::placeholder {
  color:rgba(148,163,184,0.6);
}

.generate-btn{
padding:16px 32px;
background:linear-gradient(135deg, #4f46e5, #7c3aed);
border:none;
border-radius:12px;
color:white;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:all 0.2s ease;
box-shadow:0 10px 25px rgba(79,70,229,0.3);
font-family:inherit;
letter-spacing:0.5px;
}

.generate-btn:hover{
transform:translateY(-2px);
box-shadow:0 15px 35px rgba(79,70,229,0.4);
background:linear-gradient(135deg, #4338ca, #6d28d9);
}

/* LOADER */
.loader{
display:none;
margin-top:20px;
border:3px solid rgba(30,41,59,0.9);
border-top:3px solid #4f46e5;
border-radius:50%;
width:28px;
height:28px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.view-btn{
display:none;
margin-top:24px;
padding:14px 28px;
background:linear-gradient(135deg, #059669, #047857);
border:none;
border-radius:12px;
color:white;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:all 0.2s ease;
box-shadow:0 10px 25px rgba(5,150,105,0.3);
font-family:inherit;
}

.view-btn:hover{
transform:translateY(-2px);
box-shadow:0 15px 35px rgba(5,150,105,0.4);
}

/* DASHBOARD */
.dashboard-section{
display:none;
margin-top:50px;
opacity:0;
transform:translateY(20px);
transition:all 0.4s ease;
}

.dashboard-section.show{
opacity:1;
transform:translateY(0);
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
gap:30px;
margin-bottom:40px;
}

.card{
background:rgba(30,41,59,0.85);
backdrop-filter:blur(20px);
padding:32px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.05);
transition:all 0.2s ease;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 30px 60px rgba(0,0,0,0.5);
}

.card h3{
margin-bottom:20px;
color:#a5b4fc;
font-size:20px;
font-weight:600;
letter-spacing:-0.3px;
}

#riskScore{
font-size:36px;
font-weight:700;
margin-bottom:12px;
background:linear-gradient(135deg, #10b981, #34d399);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
letter-spacing:-1px;
}

#explanation{
font-size:15px;
color:#94a3b8;
line-height:1.6;
font-weight:400;
}

/* CHART CONTAINERS - ELEGANT */
.chart-container{
height:340px;
background:rgba(17,24,39,0.6);
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
border:1px solid rgba(148,163,184,0.2);
backdrop-filter:blur(15px);
}

/* LOGS */
.logs-card{
margin-top:40px;
grid-column:1/-1;
}

.logs-card h3{
color:#fbbf24;
margin-bottom:20px;
}

.logs-card ul{
list-style:none;
padding:0;
max-height:320px;
overflow-y:auto;
}

.logs-card li{
margin-bottom:12px;
padding:14px 16px;
background:rgba(51,65,85,0.6);
border-radius:12px;
border-left:4px solid #4f46e5;
font-size:14px;
color:#e2e8f0;
font-weight:400;
transition:all 0.2s ease;
}

.logs-card li:hover{
background:rgba(79,70,229,0.15);
border-left-color:#7c3aed;
padding-left:20px;
}
</style>
</head>

<body>

<div class="header">
<h2>Investment Dashboard</h2>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="form-card">
<div class="form-row">
<input type="number" id="age" placeholder="Age">
<input type="number" id="income" placeholder="Income">
<input type="number" id="years" placeholder="Years">
<input type="number" id="loss" placeholder="Risk Tolerance (1-10)">
<input type="number" id="amount" placeholder="Investment Amount">
</div>

<button class="generate-btn" onclick="generate()">Generate Portfolio</button>

<div id="loader" class="loader"></div>

<button id="viewChartsBtn" class="view-btn" onclick="showCharts()">View Detailed Analysis</button>
</div>

<div id="dashboardSection" class="dashboard-section">

<div class="dashboard">

<div class="card">
<h3>Risk Profile</h3>
<p id="riskScore"></p>
<p id="explanation"></p>
</div>

<div class="card">
<h3>Asset Allocation</h3>
<div class="chart-container">
<canvas id="allocationChart"></canvas>
</div>
</div>

<div class="card">
<h3>Stress Test Projection</h3>
<div class="chart-container">
<canvas id="stressChart"></canvas>
</div>
</div>

</div>

<div class="card logs-card">
<h3>Agent Workflow Logs</h3>
<ul id="logs"></ul>
</div>

</div>

<script>

let allocationChart, stressChart;
let generatedData=null;

async function logout(){
await fetch("/api/logout");
location.href="index.html";
}

async function generate(){

document.getElementById("loader").style.display="block";

try{

const res = await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
age:+age.value,
income:+income.value,
years:+years.value,
loss:+loss.value,
amount:+amount.value
})
});

if(!res.ok){
throw new Error("Backend not responding");
}

generatedData = await res.json();
document.getElementById("viewChartsBtn").style.display="inline-block";

}catch(error){
alert("Backend not connected!");
}

document.getElementById("loader").style.display="none";
}

function showCharts(){

if(!generatedData) return;

const section=document.getElementById("dashboardSection");
section.style.display="block";
setTimeout(()=>{ section.classList.add("show"); },50);

animateRisk(generatedData.risk_score);

document.getElementById("explanation").innerText =
generatedData.explanation;

/* Allocation Chart */
if(allocationChart) allocationChart.destroy();
allocationChart=new Chart(
document.getElementById("allocationChart"),
{
type:"doughnut",
data:{
labels:Object.keys(generatedData.allocation),
datasets:[{
data:Object.values(generatedData.allocation),
backgroundColor:["#4f46e5","#10b981","#f59e0b","#ef4444"]
}]
},
options:{cutout:"65%",plugins:{legend:{position:"bottom"}}}
});

/* Stress Chart */
if(stressChart) stressChart.destroy();
stressChart=new Chart(
document.getElementById("stressChart"),
{
type:"bar",
data:{
labels:Object.keys(generatedData.stress_test),
datasets:[{
label:"Portfolio Value",
data:Object.values(generatedData.stress_test),
backgroundColor:"#4f46e5"
}]
},
options:{responsive:true}
});

/* Logs */
const logList=document.getElementById("logs");
logList.innerHTML="";
generatedData.logs.forEach(log=>{
const li=document.createElement("li");
li.innerText=log;
logList.appendChild(li);
});
}

function animateRisk(score){
let current=0;
const element=document.getElementById("riskScore");
const step=Math.ceil(score/50);
const interval=setInterval(()=>{
current+=step;
if(current>=score){
current=score;
clearInterval(interval);
}
element.innerText="Risk Score: "+current;
},20);
}

</script>

</body>
</html>
